version: "3.9"

services:
    webapi:
        container_name: notepad_online
        restart: always
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "5003:8080"
        networks:
            - notepad_network
        depends_on:
            - db
    db:
        image: postgres:17
        container_name: notepad_postgres
        restart: always
        environment:
            POSTGRES_DB: notepad_db
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: admin
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - notepad_network
            
networks:
    notepad_network:
        driver: bridge
        
volumes:
    postgres_data: